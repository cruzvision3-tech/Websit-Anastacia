<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anastacia Chimuco | Mentoria</title>
<style>
:root { --gold: #C9A84C; --dark: #060D1A; --white: #fff; --cream: #F5EDD8; }
*, * { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: var(--dark); color: var(--white); overflow-x: hidden; }

/* Estrutura Base */
section { padding: 80px 20px; }
img { max-width: 100%; height: auto; object-fit: cover; }

/* HERO - Ajuste Móvel */
.hero { display: flex; flex-direction: column; min-height: 100vh; padding-top: 100px; }
.hero-left { order: 2; padding: 20px; }
.hero-right { order: 1; height: 400px; width: 100%; position: relative; }
.hero-photo { width: 100%; height: 100%; object-position: top center; }

/* SOBRE - Ajuste Móvel */
.sobre-inner { display: flex; flex-direction: column; }
.sobre-imgs { position: relative; height: 350px; margin-bottom: 20px; }
.sobre-img-main { position: static; width: 100%; height: 100%; }

/* SERVIÇOS */
.servicos-grid { display: flex; flex-direction: column; gap: 20px; }

/* Ajustes Gerais para todos os elementos */
@media (min-width: 900px) {
    .hero { flex-direction: row; }
    .hero-left { order: 1; padding: 80px; }
    .hero-right { order: 2; height: 100vh; }
    .sobre-inner { flex-direction: row; }
    .servicos-grid { display: grid; grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">Anastacia Chimuco</a>
</nav>

<section class="hero">
  <div class="hero-left">
    <h1>Transforme a sua Vida & Carreira</h1>
    <p>Mentoria Premium com Anastacia Chimuco</p>
    <a href="https://wa.me/244923567286" class="btn">Iniciar Mentoria</a>
  </div>
  <div class="hero-right">
    <img src="URL_DA_TUA_FOTO" alt="Anastacia Chimuco" class="hero-photo">
  </div>
</section>

<section id="sobre" class="sobre">
  <div class="sobre-inner">
    <div class="sobre-imgs">
      <img src="URL_DA_FOTO_SOBRE" class="sobre-img-main">
    </div>
    <div class="sobre-text">
      <h2>Sobre Mim</h2>
      <p>Texto de apresentação...</p>
    </div>
  </div>
</section>

</body>
</html>
